<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Perfil · SeuMoGi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at top, #3b1d8f 0, #050016 45%, #000 100%);
            color: #fff;
        }

        .menu-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
        }


        .header {
            height: 220px;
            background: linear-gradient(135deg, #ff6ad5, #7b5cff, #4ef2ff);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 20%, #fff, #ff6ad5 40%, #7b5cff 70%, #050016 100%);
            border: 4px solid #fff;
            position: absolute;
            bottom: -65px;
            left: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: #050016;
        }

        .profile-info {
            padding: 100px 40px 20px;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .username {
            font-size: 1rem;
            color: #b8aee6;
        }

        .bio {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #e8dfff;
        }

        .counts {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .count {
            font-size: 0.9rem;
        }

        .btn-follow {
            margin-top: 15px;
            padding: 0.5rem 1.2rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ff6ad5, #7b5cff);
            color: #050016;
        }

        .posts {
            margin-top: 30px;
            padding: 0 40px 40px;
        }

        .post {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <nav class="menu-bar">
        <div class="menu-logo" onclick="window.location.href='timeline.html'">
            SeuMoGi
        </div>

        <div class="menu-center">
            <div class="menu-btn" onclick="window.location.href='timeline.html'">Inicio</div>
            <div class="menu-btn" onclick="window.location.href='global.html'">Global</div>
            <div class="menu-btn" onclick="window.location.href='music.html'">🎵 Música</div>
            <div class="menu-btn" onclick="window.location.href='theories.html'">🧠 Teorías</div>
            <div class="menu-btn"
                onclick="window.location.href='profile.html?id=' + localStorage.getItem('seumogi_user_id')">Mi Perfil
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </nav>

    <style>
        .menu-bar {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-family: Poppins, sans-serif;
            margin-bottom: 20px;
        }

        .menu-logo {
            cursor: pointer;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .menu-center {
            display: flex;
            gap: 12px;
        }

        .menu-btn {
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            cursor: pointer;
            transition: 0.25s;
            font-size: 0.9rem;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, #ff6ad5, #7b5cff);
            color: #050016;
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(255, 106, 213, 0.6);
        }

        .logout-btn {
            padding: 6px 14px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6ad5, #7b5cff);
            color: #050016;
            font-weight: 600;
            transition: 0.25s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(255, 106, 213, 0.6);
        }
    </style>

    <script>
        function logout() {
            localStorage.removeItem('seumogi_token');
            localStorage.removeItem('seumogi_user_id');
            window.location.href = 'index.html';
        }
    </script>



    <div class="header"></div>

    <div class="avatar" id="avatar">U</div>

    <div class="profile-info">
        <div class="name" id="name">Nombre</div>
        <div class="username" id="username">@usuario</div>
        <div class="bio" id="bio">Aquí irá la bio del usuario…</div>

        <button id="edit-bio-btn" style="
    margin-top:10px;
    padding:0.4rem 1rem;
    border-radius:999px;
    border:none;
    cursor:pointer;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:0.8rem;
    display:none;
">Editar bio</button>

        <div id="bio-editor" style="display:none; margin-top:10px;">
            <textarea id="bio-textarea" style="
        width:100%;
        min-height:80px;
        border-radius:12px;
        padding:0.6rem;
        border:none;
        outline:none;
        resize:vertical;
        font-family:Poppins;
    "></textarea>
            <button id="save-bio-btn" style="
        margin-top:8px;
        padding:0.4rem 1rem;
        border-radius:999px;
        border:none;
        cursor:pointer;
        background:linear-gradient(135deg,#ff6ad5,#7b5cff);
        color:#050016;
        font-weight:600;
    ">Guardar</button>
        </div>


        <div class="counts">
            <div class="count" id="followers">Seguidores: 0</div>
            <div class="count" id="following">Siguiendo: 0</div>
            <div class="count" id="posts-count">Posts: 0</div>
        </div>

        <button class="btn-follow" id="btn-follow">Seguir</button>
    </div>

    <div class="posts" id="posts"></div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const params = new URLSearchParams(window.location.search);
        // const userId = params.get('id');
        const userId = new URLSearchParams(window.location.search).get('id');

        let authToken = localStorage.getItem('seumogi_token') || null;

        async function api(path, options = {}) {
            const headers = options.headers || {};
            headers['Accept'] = 'application/json';
            headers['Content-Type'] = 'application/json';
            if (authToken) headers['Authorization'] = 'Bearer ' + authToken;

            const res = await fetch(API_BASE + path, { ...options, headers });
            return await res.json();
        }

        async function loadProfile() {
            const data = await api('/user/' + userId);

            document.getElementById('name').textContent = data.name;
            document.getElementById('username').textContent = '@' + data.username;
            document.getElementById('bio').textContent = data.bio || 'Este usuario no tiene bio.';
            document.getElementById('avatar').textContent = data.username[0].toUpperCase();

            document.getElementById('followers').textContent = 'Seguidores: ' + data.followers_count;
            document.getElementById('following').textContent = 'Siguiendo: ' + data.following_count;
            document.getElementById('posts-count').textContent = 'Posts: ' + data.posts.length;

            const btn = document.getElementById('btn-follow');
            if (data.is_following) {
                btn.textContent = 'Siguiendo ✓';
            } else {
                btn.textContent = 'Seguir';
            }

            btn.onclick = async () => {
                if (data.is_following) {
                    await api('/follow/' + userId, { method: 'DELETE' });
                    data.is_following = false;
                    btn.textContent = 'Seguir';
                } else {
                    await api('/follow/' + userId, { method: 'POST' });
                    data.is_following = true;
                    btn.textContent = 'Siguiendo ✓';
                }
            };

            const postsContainer = document.getElementById('posts');
            postsContainer.innerHTML = '';

            data.posts.forEach(p => {
                const el = document.createElement('div');
                el.className = 'post';
                el.textContent = p.content;
                postsContainer.appendChild(el);
            });

            // Mostrar botón de editar bio solo si es mi perfil
            const myId = localStorage.getItem('seumogi_user_id');
            if (myId && myId == userId) {
                document.getElementById('edit-bio-btn').style.display = 'inline-block';
            }

        }

        loadProfile();

        // Editar bio
        document.getElementById('edit-bio-btn').addEventListener('click', () => {
            const bio = document.getElementById('bio').textContent;
            document.getElementById('bio-textarea').value = bio;
            document.getElementById('bio-editor').style.display = 'block';
        });

        // Guardar bio
        document.getElementById('save-bio-btn').addEventListener('click', async () => {
            const newBio = document.getElementById('bio-textarea').value;

            await api('/user/' + userId + '/bio', {
                method: 'PUT',
                body: JSON.stringify({ bio: newBio })
            });

            document.getElementById('bio').textContent = newBio;
            document.getElementById('bio-editor').style.display = 'none';
        });

    </script>

</body>

</html>
