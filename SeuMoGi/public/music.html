<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Música · SeuMoGi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at top, #3b1d8f 0, #050016 45%, #000 100%);
            color: #fff;
            padding: 20px;
        }

        .menu-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
        }


        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .search-box {
            margin-bottom: 20px;
            text-align: center;
        }

        .search-box input {
            width: 80%;
            padding: 0.6rem;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .music-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 15px;
        }

        .cover {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6ad5, #7b5cff, #4ef2ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #050016;
        }

        .info {
            flex: 1;
        }

        .title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .artist {
            font-size: 1rem;
            color: #b8aee6;
            margin-bottom: 10px;
        }

        iframe {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            border: none;
            margin-top: 10px;
        }

        .back {
            display: inline-block;
            margin-bottom: 15px;
            color: #b8aee6;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <nav class="menu-bar">
        <div class="menu-logo" onclick="window.location.href='timeline.html'">
            SeuMoGi
        </div>

        <div class="menu-center">
            <div class="menu-btn" onclick="window.location.href='timeline.html'">Inicio</div>
            <div class="menu-btn" onclick="window.location.href='global.html'">Global</div>
            <div class="menu-btn" onclick="window.location.href='music.html'">🎵 Música</div>
            <div class="menu-btn" onclick="window.location.href='theories.html'">🧠 Teorías</div>
            <div class="menu-btn"
                onclick="window.location.href='profile.html?id=' + localStorage.getItem('seumogi_user_id')">Mi Perfil
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </nav>

    <style>
        .menu-bar {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-family: Poppins, sans-serif;
            margin-bottom: 20px;
        }

        .menu-logo {
            cursor: pointer;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .menu-center {
            display: flex;
            gap: 12px;
        }

        .menu-btn {
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            cursor: pointer;
            transition: 0.25s;
            font-size: 0.9rem;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, #ff6ad5, #7b5cff);
            color: #050016;
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(255, 106, 213, 0.6);
        }

        .logout-btn {
            padding: 6px 14px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6ad5, #7b5cff);
            color: #050016;
            font-weight: 600;
            transition: 0.25s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(255, 106, 213, 0.6);
        }
    </style>

    <script>
        function logout() {
            localStorage.removeItem('seumogi_token');
            localStorage.removeItem('seumogi_user_id');
            window.location.href = 'index.html';
        }
    </script>


    <div class="container">

        <div class="back" onclick="history.back()">← Volver</div>

        <h1>Música K‑Pop 🎧</h1>

        <div class="search-box">
            <input type="text" id="search" placeholder="Buscar por canción o artista...">
        </div>

        <div id="music-list"></div>

    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let authToken = localStorage.getItem('seumogi_token') || null;

        async function api(path, options = {}) {
            const headers = options.headers || {};
            headers['Accept'] = 'application/json';
            headers['Content-Type'] = 'application/json';
            if (authToken) headers['Authorization'] = 'Bearer ' + authToken;

            const res = await fetch(API_BASE + path, { ...options, headers });
            return await res.json();
        }

        async function loadMusic() {
            const posts = await api('/posts'); // usamos tu timeline

            const musicPosts = posts.data.filter(p => p.type === 'music');

            renderMusic(musicPosts);

            document.getElementById('search').addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase();
                const filtered = musicPosts.filter(p =>
                    p.song_title.toLowerCase().includes(q) ||
                    p.song_artist.toLowerCase().includes(q)
                );
                renderMusic(filtered);
            });
        }

        function renderMusic(list) {
            const container = document.getElementById('music-list');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = '<p>No hay canciones que coincidan.</p>';
                return;
            }

            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'music-card';

                const cover = document.createElement('div');
                cover.className = 'cover';
                cover.textContent = p.song_title[0].toUpperCase();

                const info = document.createElement('div');
                info.className = 'info';

                info.innerHTML = `
                <div class="title">${p.song_title}</div>
                <div class="artist">${p.song_artist}</div>
                <div>${p.content}</div>
            `;

                // Reproductor YouTube o Spotify
                if (p.song_url) {
                    const iframe = document.createElement('iframe');
                    iframe.src = p.song_url;
                    info.appendChild(iframe);
                }

                card.appendChild(cover);
                card.appendChild(info);
                container.appendChild(card);
            });
        }

        loadMusic();
    </script>

</body>

</html>
